<div class="card" [class.card--closed]="isDayClosed()">
  <h2>Registrar fichaje</h2>

  @if (isDayClosed()) {
    <div class="day-closed-msg">
      <span class="day-closed-icon">🚫</span>
      <p>Este día está bloqueado y no permite fichajes.</p>
    </div>
  } @else {
    <!-- Time + description fields -->
    <div class="form-fields">
      <label class="input-group">
        <span>Hora</span>
        <input
          type="time"
          [value]="timeInput()"
          [disabled]="saving()"
          (input)="onTimeInput($event)"
        />
      </label>

      <label class="input-group">
        <span>Descripción</span>
        <input
          type="text"
          placeholder="Opcional"
          [value]="description()"
          [disabled]="saving()"
          (input)="onDescriptionInput($event)"
        />
      </label>
    </div>

    <!-- Direct action CTA buttons — one click registers the fichaje -->
    <div class="action-ctas" role="group" aria-label="Registrar fichaje">
      @for (cfg of actionConfigs(); track cfg.type) {
        <button
          type="button"
          class="action-cta"
          [class]="'action-cta action-cta--' + cfg.colorClass"
          [disabled]="saving()"
          (click)="onDirectAction(cfg.type)"
          [attr.aria-label]="cfg.label + ' a las ' + timeInput()">
          @if (saving()) {
            <span class="spinner"></span>
            Guardando…
          } @else {
            <span class="action-cta__icon">{{ cfg.icon }}</span>
            {{ cfg.label }}
          }
        </button>
      }
    </div>
  }
</div>
