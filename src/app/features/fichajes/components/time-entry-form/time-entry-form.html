<div class="card" [class.card--closed]="isDayClosed()">
  <h2>Registrar fichaje</h2>

  @if (isDayClosed()) {
    <div class="day-closed-msg">
      <span class="day-closed-icon">⏹</span>
      <p>Jornada finalizada. No se pueden añadir más fichajes hoy.</p>
    </div>
  } @else {
    <!-- Action buttons -->
    <div class="action-buttons" role="group" aria-label="Tipo de fichaje">
      @for (cfg of actionConfigs(); track cfg.type) {
        <button
          type="button"
          class="action-btn"
          [class]="'action-btn ' + cfg.colorClass"
          [class.action-btn--active]="typeInput() === cfg.type"
          [disabled]="isDisabled()"
          (click)="selectAction(cfg.type)"
          [attr.aria-pressed]="typeInput() === cfg.type"
          [title]="cfg.label">
          <span class="action-btn__icon">{{ cfg.icon }}</span>
          <span class="action-btn__label">{{ cfg.label }}</span>
        </button>
      }
    </div>

    <label class="input-group">
      <span>Hora</span>
      <input
        type="time"
        [value]="timeInput()"
        [disabled]="isDisabled()"
        (input)="onTimeInput($event)"
      />
    </label>

    <label class="input-group">
      <span>Descripción</span>
      <input
        type="text"
        placeholder="Opcional"
        [value]="description()"
        [disabled]="isDisabled()"
        (input)="onDescriptionInput($event)"
      />
    </label>

    <button
      class="btn"
      type="button"
      [disabled]="isDisabled()"
      (click)="addEntry.emit()">
      @if (saving()) {
        Guardando…
      } @else {
        {{ typeInput() }} {{ timeInput() }}
      }
    </button>
  }
</div>
