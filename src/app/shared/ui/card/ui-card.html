<article class="ui-card" [class.ui-card--compact]="compact()">
  @if (title() || subtitle()) {
    <header class="ui-card__header">
      @if (title()) {
        <h3 class="ui-card__title">{{ title() }}</h3>
      }
      @if (subtitle()) {
        <p class="ui-card__subtitle">{{ subtitle() }}</p>
      }
    </header>
  }

  <div class="ui-card__body">
    <ng-content></ng-content>
  </div>
</article>
